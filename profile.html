<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>마이페이지 - 러닝크루</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 20px 20px;">
      <header style="margin-bottom: 8px;">
        <h1 class="title">마이페이지</h1>
        <p class="subtitle">내 활동 기록을 확인하세요.</p>
      </header>

      <!-- User Info -->
      <section class="glass-panel"
        style="padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 24px;">
        <div
          style="width: 60px; height: 60px; border-radius: 50%; background-color: var(--surface-light); flex-shrink: 0; display: flex; justify-content: center; align-items: center;">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div>
          <h2 id="profile-name" style="font-size: 20px; font-weight: 700; margin-bottom: 4px;">러너</h2>
          <p id="profile-phone" style="font-size: 14px; color: var(--text-muted);">시즌 1 크루원</p>
        </div>
      </section>

      <!-- Stats -->
      <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px;">
        <div class="glass-panel" style="padding: 20px;">
          <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">총 러닝 거리</div>
          <div style="font-size: 24px; font-weight: 700;"><span id="profile-dist">0.0</span> <span
              style="font-size: 14px; font-weight: 500; color: var(--text-muted);">km</span></div>
        </div>
        <div class="glass-panel" style="padding: 20px;">
          <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">총 출석 횟수</div>
          <div style="font-size: 24px; font-weight: 700;"><span id="profile-count">0</span> <span
              style="font-size: 14px; font-weight: 500; color: var(--text-muted);">/ 25회</span></div>
        </div>
      </section>

      <!-- Settings List -->
      <section>
        <div
          style="font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; padding-left: 8px;">
          설정 및 관리</div>
        <div class="glass-panel" style="overflow: hidden;">
          <div id="edit-name-btn"
            style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;">
            <span style="font-size: 15px;">닉네임 수정</span>
            <svg width="16" height="16" fill="none" stroke="var(--text-muted)" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </div>
          <a href="https://vimeo.com/1109689201?share=copy&fl=sv&fe=ci" target="_blank">
            <div
              style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <span style="font-size: 15px;">추천 플레이 리스트</span>
              <svg width="16" height="16" fill="none" stroke="var(--text-muted)" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </div>
          </a>
          <a href="index.html">
            <div
              style="padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
              <span style="font-size: 15px; color: var(--error);">로그아웃</span>
            </div>
          </a>
        </div>
      </section>

      <!-- Edit Name Modal -->
      <div id="edit-name-modal" class="hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; padding: 20px;">
        <div class="glass-panel animate-fade-in"
          style="width: 100%; max-width: 350px; padding: 30px; background: var(--surface);">
          <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center;">이름 수정하기</h3>
          <input type="text" id="new-name-input" class="input-field" placeholder="새 이름을 입력하세요"
            style="margin-bottom: 24px;">
          <div style="display: flex; gap: 12px;">
            <button id="cancel-edit-btn" class="btn-secondary" style="flex: 1;">취소</button>
            <button id="save-name-btn" class="btn-primary" style="flex: 1;">저장</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>

</html>
