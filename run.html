<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>러닝 트래커 - 풀러닝</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- HTML2Canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 20px; position: relative;">
      
      <!-- Top Right Actions -->
      <div id="capture-insta-btn" class="hidden" style="position: absolute; top: 15px; right: 15px; z-index: 100; cursor: pointer; padding: 10px; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px);" data-html2canvas-ignore>
        <svg width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </div>

      <!-- Capture Area: This part will be saved as PNG -->
      <div id="capture-area" style="padding: 20px; border-radius: 24px; background: transparent;">
        <header style="margin-bottom: 20px; text-align: center;">
          <h1 class="title" style="font-size: 24px; letter-spacing: 2px;">FULL RUNNING</h1>
          <p class="subtitle" id="capture-date" style="font-size: 13px; color: var(--text-muted);">오늘의 러닝 기록</p>
        </header>

        <div id="metrics-container" class="hidden" style="display: flex; flex-direction: column; align-items: center;">
          <!-- Main Metric -->
          <div style="margin-bottom: 40px; text-align: center;">
            <div id="distance-display" style="font-size: 64px; font-weight: 800; color: var(--primary); line-height: 1; font-family: monospace; letter-spacing: -0.05em;">
              0.00
            </div>
            <div style="font-size: 16px; color: var(--text-muted); font-weight: 600;">KILOMETERS</div>
          </div>

          <!-- Sub Metrics -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; margin-bottom: 30px;">
            <div style="text-align: center;">
              <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">TIME</div>
              <div id="time-display" style="font-size: 24px; font-weight: 700; font-family: monospace;">00:00</div>
            </div>
            <div style="text-align: center;">
              <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">PACE</div>
              <div id="pace-display" style="font-size: 24px; font-weight: 700; font-family: monospace;">0'00"</div>
            </div>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
          <!-- Real Map Container (Smaller) -->
          <div class="glass-panel" id="map-capture-block" style="width: 100%; height: 200px; overflow: hidden; position: relative; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);">
            <div id="map" style="width: 100%; height: 100%;"></div>
            <div id="map-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center; pointer-events: none;">
              <span style="color: #fff; font-size: 14px; font-weight: 600;">GPS 호출 중...</span>
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top: 20px; width: 100%;" data-html2canvas-ignore>
        <div style="display: flex; gap: 12px;">
          <button id="start-run-btn" class="btn-primary" style="flex: 1; height: 60px; border-radius: 30px; font-size: 18px; font-weight: 700;">
            러닝 시작
          </button>
          
          <button id="stop-run-btn" class="hidden" style="flex: 1; height: 60px; border-radius: 30px; background: var(--error); color: #fff; font-weight: 700; font-size: 16px; border: none; cursor: pointer;">
            러닝 끝내기
          </button>
        </div>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
