<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>러닝 트래커 - 러닝크루</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 30px 20px;">
      <header style="margin-bottom: 40px; text-align: center;">
        <h1 style="font-size: 18px; font-weight: 600; color: var(--text-muted);">GPS 러닝 트래킹</h1>
      </header>

      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        
        <!-- Main Metric -->
        <div style="margin-bottom: 60px; text-align: center;">
          <div id="distance-display" style="font-size: 72px; font-weight: 800; color: #fff; line-height: 1; font-family: monospace; letter-spacing: -0.05em; transition: color 0.3s;">
            0.00
          </div>
          <div style="font-size: 18px; color: var(--text-muted); font-weight: 600;">킬로미터</div>
        </div>

        <!-- Sub Metrics -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; max-width: 300px; margin-bottom: 30px;">
          <div style="text-align: center;">
            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 8px;">시간</div>
            <div id="time-display" style="font-size: 28px; font-weight: 700; font-family: monospace;">00:00</div>
          </div>
          <div style="text-align: center;">
            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 8px;">페이스</div>
            <div id="pace-display" style="font-size: 28px; font-weight: 700; font-family: monospace;">0'00"</div>
          </div>
        </div>

        <!-- Real Map Container -->
        <div class="glass-panel" style="width: 100%; height: 250px; overflow: hidden; margin-bottom: 20px; position: relative;">
          <div id="map" style="width: 100%; height: 100%;"></div>
          <div id="map-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center; pointer-events: none;">
            <span style="color: #fff; font-size: 14px; font-weight: 600;">GPS 신호를 기다리는 중...</span>
          </div>
        </div>

      </div>

      <div style="margin-top: auto; display: flex; justify-content: center; padding-bottom: 20px;">
        <button id="start-run-btn"
          style="
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--primary);
            color: #000;
            font-size: 18px;
            font-weight: 800;
            border: none;
            box-shadow: 0 0 30px rgba(202, 255, 4, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
          "
        >
          시작
        </button>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
