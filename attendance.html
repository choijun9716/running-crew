<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출석 - 러닝크루</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 30px 20px;">
      <header style="margin-bottom: 32px;">
        <h1 class="title">출석 체크</h1>
        <p class="subtitle">모임 현장에서 관리자 비밀번호를 입력해 주세요.</p>
      </header>

      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        
        <!-- Password Input State -->
        <div id="frame-idle" style="width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;">
          
          <div style="width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 16px;">
            <label style="font-size: 14px; color: var(--text-muted); font-weight: 500; text-align: center;">관리자 출석 비밀번호</label>
            <input type="password" id="attendance-password" class="input-field" placeholder="비밀번호 4자리" style="text-align: center; font-size: 24px; letter-spacing: 4px;">
          </div>
          <p id="attendance-error" style="color: var(--error); font-size: 14px; margin-top: 16px; min-height: 20px;"></p>
        </div>

        <!-- Scanning/Saving State -->
        <div id="frame-scanning" class="glass-panel hidden" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden;">
          <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
          <style jsx>{`
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
          `}</style>
          <p style="margin-top: 24px; color: var(--primary); font-weight: 600;">서버에 기록 중입니다...</p>
        </div>

        <!-- Success State -->
        <div id="frame-success" class="glass-panel animate-fade-in hidden" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: rgba(202, 255, 4, 0.05); border-color: var(--primary);">
          <div style="width: 80px; height: 80px; border-radius: 50%; background-color: var(--primary); display: flex; justify-content: center; align-items: center; margin-bottom: 24px; box-shadow: 0 0 30px rgba(202, 255, 4, 0.4);">
            <svg width="40" height="40" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <h2 style="font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px;">출석 완료!</h2>
          <p style="color: var(--text-muted); text-align: center;">오늘도 멋진 러닝을 응원합니다.<br>대시보드에서 진행률을 확인하세요.</p>
        </div>

      </div>

      <div style="margin-top: auto; padding-top: 40px;">
        <button id="scan-btn" class="btn-primary" style="opacity: 0.5; pointer-events: none;">
          출석 확인
        </button>
        <button id="retry-btn" class="btn-secondary hidden" onclick="window.location.href='dashboard.html'">
          대시보드로 가기
        </button>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
