<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출석 - 러닝크루</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 30px 20px;">
      <header style="margin-bottom: 32px;">
        <h1 class="title">QR 출석</h1>
        <p class="subtitle">현장에 있는 모임 QR을 스캔하세요.</p>
      </header>

      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        
        <!-- Idle State -->
        <div id="frame-idle" class="glass-panel" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;">
          <div style="position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border-top: 4px solid var(--primary); border-left: 4px solid var(--primary); border-radius: 8px 0 0 0;"></div>
          <div style="position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-top: 4px solid var(--primary); border-right: 4px solid var(--primary); border-radius: 0 8px 0 0;"></div>
          <div style="position: absolute; bottom: 20px; left: 20px; width: 40px; height: 40px; border-bottom: 4px solid var(--primary); border-left: 4px solid var(--primary); border-radius: 0 0 0 8px;"></div>
          <div style="position: absolute; bottom: 20px; right: 20px; width: 40px; height: 40px; border-bottom: 4px solid var(--primary); border-right: 4px solid var(--primary); border-radius: 0 0 8px 0;"></div>

          <svg width="64" height="64" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5M4 8h5M4 12h5M4 16h5M4 20h5M12 4h8M12 8h8M12 12h8M12 16h8M12 20h8"></path><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          <p style="margin-top: 16px; color: var(--text-muted);">스캐너를 실행하려면 아래 버튼을 누르세요</p>
        </div>

        <!-- Scanning State -->
        <div id="frame-scanning" class="glass-panel hidden" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden;">
          <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background-color: var(--primary); box-shadow: 0 0 20px 4px rgba(202, 255, 4, 0.8); animation: scan-laser 1.5s infinite linear;"></div>
          <p style="margin-top: 16px; color: var(--primary); font-weight: 600;">QR 코드를 찾는 중...</p>
        </div>

        <!-- Success State -->
        <div id="frame-success" class="glass-panel animate-fade-in hidden" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: rgba(202, 255, 4, 0.05); border-color: var(--primary);">
          <div style="width: 80px; height: 80px; border-radius: 50%; background-color: var(--primary); display: flex; justify-content: center; align-items: center; margin-bottom: 24px; box-shadow: 0 0 30px rgba(202, 255, 4, 0.4);">
            <svg width="40" height="40" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <h2 style="font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px;">출석 완료!</h2>
          <p style="color: var(--text-muted);">오늘도 멋진 러닝을 응원합니다.</p>
        </div>

      </div>

      <div style="margin-top: auto; padding-top: 40px;">
        <button id="scan-btn" class="btn-primary">
          QR 스캔하기
        </button>
        <button id="retry-btn" class="btn-secondary hidden">
          다시 시도하기
        </button>
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
