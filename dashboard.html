<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>풀러닝 대시보드</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 30px 20px;">
      <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px;">
        <div>
          <h1 id="dashboard-name" style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">반가워요, 러너님! 👋</h1>
          <p style="color: var(--text-muted); font-size: 14px;">오늘도 힘차게 달려볼까요?</p>
        </div>
        <a href="profile.html" style="display: flex; align-items: center; margin-top: 4px;">
          <div
            style="width: 44px; height: 44px; border-radius: 50%; background-color: var(--surface-light); display: flex; justify-content: center; align-items: center; cursor: pointer;">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </a>
      </header>

      <!-- Multi-tier Reward Progress -->
      <section class="glass-panel" style="padding: 24px; margin-bottom: 32px; position: relative; overflow: hidden;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px;">
          <div>
            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">나의 목표 진행률</div>
            <div style="font-size: 28px; font-weight: 700;"><span id="progress-value">0</span><span
                style="font-size: 16px; font-weight: 500; color: var(--text-muted);"> / 25회</span></div>
          </div>
        </div>

        <div class="progress-bg" style="margin-bottom: 24px; height: 12px; position: relative;">
          <!-- Track -->
          <div id="progress-bar" class="progress-fill" style="width: 0%;"></div>
          
          <!-- Milestone Markers -->
          <div style="position: absolute; left: 40%; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; background: var(--surface-light); border: 2px solid var(--border); z-index: 2;" id="node-10"></div>
          <div style="position: absolute; left: 80%; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; background: var(--surface-light); border: 2px solid var(--border); z-index: 2;" id="node-20"></div>
          <div style="position: absolute; left: 100%; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; background: var(--surface-light); border: 2px solid var(--border); z-index: 2;" id="node-25"></div>
        </div>

        <!-- Reward Descriptions -->
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <div id="reward-10" style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px;">
            <div style="font-size: 14px; font-weight: 600;"><span style="color: var(--text-muted); margin-right: 8px;">10회</span> 🥕 당근라페 증정</div>
            <div class="reward-status" style="font-size: 12px; color: var(--text-muted); font-weight: 600;">진행중</div>
          </div>
          <div id="reward-20" style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px;">
            <div style="font-size: 14px; font-weight: 600;"><span style="color: var(--text-muted); margin-right: 8px;">20회</span> 🍅 방토라미네이드 증정</div>
            <div class="reward-status" style="font-size: 12px; color: var(--text-muted); font-weight: 600;">진행중</div>
          </div>
          <div id="reward-25" style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px;">
            <div style="font-size: 14px; font-weight: 600;"><span style="color: var(--text-muted); margin-right: 8px;">25회</span> 🥗 샐러드 1주 코스 증정</div>
            <div class="reward-status" style="font-size: 12px; color: var(--text-muted); font-weight: 600;">도전!</div>
          </div>
        </div>
      </section>

      <!-- Quick Menu -->
      <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px;">
        <a href="attendance.html"
          style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px 16px; background-color: var(--surface-light); border-radius: 20px; text-decoration: none;">
          <div
            style="width: 48px; height: 48px; border-radius: 50%; background-color: var(--primary); display: flex; justify-content: center; align-items: center; margin-bottom: 12px; color: #000;">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
          </div>
          <div style="font-size: 15px; font-weight: 600; color: #fff;">QR 출석하기</div>
        </a>

        <a href="run.html"
          style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px 16px; background-color: var(--surface-light); border-radius: 20px; text-decoration: none;">
          <div
            style="width: 48px; height: 48px; border-radius: 50%; background-color: var(--primary); display: flex; justify-content: center; align-items: center; margin-bottom: 12px; color: #000;">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </div>
          <div style="font-size: 15px; font-weight: 600; color: #fff;">러닝 시작</div>
        </a>
      </section>

      <!-- Recent Running View -->
      <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="font-size: 18px; font-weight: 700;">최근 러닝 기록</h2>
          <span style="font-size: 13px; color: var(--text-muted); cursor: pointer;" onclick="alert('전체 기록 조회는 준비중입니다.')">더보기</span>
        </div>

        <div id="recent-run-card" class="glass-panel"
          style="padding: 16px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">최근 러닝</div>
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 2px;">러닝 기록이 없습니다.</div>
            <div style="font-size: 13px; color: var(--text-muted);">러닝 탭에서 달리기를 시작하세요!</div>
          </div>
          <div
            style="width: 40px; height: 40px; border-radius: 50%; background-color: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </div>
        </div>
      </section>
      
      <div style="height: 100px;"></div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>

</html>
