<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>대시보드 - 러닝크루</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="content-area animate-fade-in" style="padding: 30px 20px;">
      <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px;">
        <div>
          <h1 id="dashboard-name" style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">반가워요, 러너님! 👋</h1>
          <p style="color: var(--text-muted); font-size: 14px;">오늘도 힘차게 달려볼까요?</p>
        </div>
        <a href="profile.html" style="display: flex; align-items: center; margin-top: 4px;">
          <div style="width: 44px; height: 44px; border-radius: 50%; background-color: var(--surface-light); display: flex; justify-content: center; align-items: center; cursor: pointer;">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
        </a>
      </header>

      <!-- Reward Progress -->
      <section class="glass-panel" style="padding: 24px; margin-bottom: 32px; position: relative; overflow: hidden;">
        <div style="position: absolute; top: -10px; right: -10px; width: 80px; height: 80px; background: radial-gradient(circle, rgba(202,255,4,0.15) 0%, rgba(202,255,4,0) 70%); border-radius: 50%;"></div>
        
        <h2 style="font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px;">현재 출석 진행률</h2>
        
        <div style="display: flex; align-items: flex-end; gap: 8px; margin-bottom: 8px;">
          <span id="progress-value" style="font-size: 32px; font-weight: 800; color: var(--primary); line-height: 1;">4</span>
          <span style="font-size: 16px; color: var(--text-muted); padding-bottom: 4px;">/ 5회</span>
        </div>
        
        <p id="reward-text" style="font-size: 14px; margin-bottom: 20px;">1회만 더 출석하면 <strong>러닝 티셔츠🎁</strong> 달성!</p>

        <!-- Progress Bar -->
        <div style="width: 100%; height: 8px; background-color: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden;">
          <div id="progress-bar" style="width: 80%; height: 100%; background-color: var(--primary); border-radius: 4px; box-shadow: 0 0 10px rgba(202, 255, 4, 0.5); transition: width 0.5s ease;"></div>
        </div>
      </section>

      <!-- Quick Menu -->
      <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px;">
        <a href="attendance.html">
          <div class="glass-panel" style="padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; cursor: pointer;">
            <div style="width: 48px; height: 48px; border-radius: 14px; background-color: rgba(255, 255, 255, 0.05); display: flex; justify-content: center; align-items: center; color: #fff;">
              <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M3 9h18"></path><path d="M9 21V9"></path></svg>
            </div>
            <span style="font-size: 14px; font-weight: 600;">QR 출석하기</span>
          </div>
        </a>
        <a href="run.html">
          <div class="glass-panel" style="padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; cursor: pointer; border: 1px solid rgba(202, 255, 4, 0.2);">
            <div style="width: 48px; height: 48px; border-radius: 14px; background-color: var(--primary); display: flex; justify-content: center; align-items: center; color: #000;">
              <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
            <span style="font-size: 14px; font-weight: 600; color: var(--primary);">러닝 시작</span>
          </div>
        </a>
      </section>

      <!-- Recent Running View -->
      <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="font-size: 18px; font-weight: 700;">최근 러닝 기록</h2>
          <span style="font-size: 13px; color: var(--text-muted);">더보기</span>
        </div>
        
        <div id="recent-run-card" class="glass-panel" style="padding: 16px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">최근 러닝</div>
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 2px;">러닝 기록이 없습니다.</div>
            <div style="font-size: 13px; color: var(--text-muted);">러닝 탭에서 달리기를 시작하세요!</div>
          </div>
          <div style="width: 40px; height: 40px; border-radius: 50%; background-color: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>홈</span>
      </a>
      <a href="attendance.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>출석</span>
      </a>
      <a href="run.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>러닝</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>MY</span>
      </a>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
